<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Citi Invest</title><script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --citi-blue: #1D4ED8;
    --citi-light: #BFDBFE;
    --citi-dark: #1E3A8A;
    --citi-red: #EF4444;
  }
  .bg-citi { background-color: var(--citi-blue); }
  .bg-citi-dark { background-color: var(--citi-dark); }
  .text-citi { color: var(--citi-blue); }
  .border-citi { border-color: var(--citi-blue); }
  .btn-citi { background-color: var(--citi-blue); }
  .btn-citi:hover { background-color: var(--citi-dark); }
</style>
</head>
<body class="bg-blue-50">
<div id="app" class="max-w-6xl mx-auto p-4"></div>
<script>
const API_URL = 'http://localhost:3000';
let token = sessionStorage.getItem('token');
let userRole = sessionStorage.getItem('role');
const app = document.getElementById('app');

function renderLogin() {
  app.innerHTML = `
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md mx-auto mt-20 border-t-4 border-citi">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-citi">Citi Invest</h1>
        <div class="w-16 h-1 bg-citi-red mx-auto mt-2 rounded"></div>
        <p class="text-gray-600 mt-2">Secure Loan Platform</p>
      </div>
      <input id="email" placeholder="Email" class="w-full p-3 border border-citi rounded mb-3 focus:ring-2 focus:ring-blue-300">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 border border-citi rounded mb-3 focus:ring-2 focus:ring-blue-300">
      <button onclick="login()" class="w-full btn-citi text-white p-3 rounded font-semibold transition">Login</button>
      <p class="text-sm text-gray-500 mt-4 text-center">Admin: admin@citiinvest.com / admin123</p>
    </div>`;
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch(`${API_URL}/api/login`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (data.token) {
    sessionStorage.setItem('token', data.token);
    sessionStorage.setItem('role', data.role);
    token = data.token; userRole = data.role;
    userRole === 'admin' ? renderAdmin() : renderCustomer();
  } else alert(data.error);
}

async function renderCustomer() {
  app.innerHTML = `
    <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-citi">
      <div class="flex justify-between items-center mb-6">
        <div><h1 class="text-2xl font-bold text-citi">Citi Invest</h1>
        <p class="text-gray-600">Apply for Your Loan</p></div>
        <button onclick="logout()" class="text-red-600 hover:text-red-800">Logout</button>
      </div>
      <select id="category" class="w-full p-3 border border-citi rounded mb-3">
        <option>Personal Loan</option><option>Investment Loan</option>
        <option>Mortgage Loan</option><option>Emergency Loan</option>
      </select>
      <input id="amount" type="number" placeholder="Loan Amount AUD" class="w-full p-3 border border-citi rounded mb-3">
      <input id="term" type="number" placeholder="Term in Months" class="w-full p-3 border border-citi rounded mb-3">
      <label class="flex items-center mb-3"><input id="hasGuarantor" type="checkbox" class="mr-2"> I have a guarantor</label>
      <input id="kyc" type="file" multiple class="w-full p-3 border border-citi rounded mb-3">
      <button onclick="applyLoan()" class="w-full btn-citi text-white p-3 rounded font-semibold">Submit Application</button>
      <div id="msg" class="mt-4"></div>
    </div>`;
}

async function applyLoan() {
  const formData = new FormData();
  formData.append('category', document.getElementById('category').value);
  formData.append('amount', document.getElementById('amount').value);
  formData.append('term_months', document.getElementById('term').value);
  formData.append('has_guarantor', document.getElementById('hasGuarantor').checked);
  const files = document.getElementById('kyc').files;
  for (let f of files) formData.append('kyc_docs', f);
  
  const res = await fetch(`${API_URL}/api/loan/apply`, {
    method: 'POST', headers: {'Authorization': `Bearer ${token}`}, body: formData
  });
  const data = await res.json();
  if (data.needs_payment) {
    document.getElementById('msg').innerHTML = `
      <div class="bg-blue-50 border-l-4 border-citi p-4 rounded">
        <p class="font-semibold text-citi">No guarantor: 3.5% upfront fee required</p>
        <p class="text-2xl font-bold text-citi-dark my-2">AUD $${data.upfront_fee.toFixed(2)}</p>
        <button onclick="payFee(${data.loan_id})" class="mt-2 bg-citi-red text-white px-6 py-2 rounded font-semibold">Pay with Stripe</button>
      </div>`;
  } else {
    document.getElementById('msg').innerHTML = `<p class="text-green-600 font-semibold">✓ Application submitted! Loan ID: ${data.loan_id}</p>`;
  }
}

async function payFee(loan_id) {
  const res = await fetch(`${API_URL}/api/stripe/create-checkout`, {
    method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
    body: JSON.stringify({loan_id})
  });
  const data = await res.json();
  window.location.href = data.url;
}

async function renderAdmin() {
  const res = await fetch(`${API_URL}/api/admin/loans`, {headers: {'Authorization': `Bearer ${token}`}});
  const loans = await res.json();
  app.innerHTML = `
    <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-citi">
      <div class="flex justify-between items-center mb-6">
        <div><h1 class="text-2xl font-bold text-citi">Citi Invest Admin</h1>
        <p class="text-gray-600">Loan Management Dashboard</p></div>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>
      <div class="overflow-x-auto">
      <table class="w-full text-sm"><thead class="bg-blue-100"><tr>
        <th class="text-left p-3">Email</th><th>Category</th><th>Amount</th><th>Fee</th><th>Paid</th><th>Status</th><th>Action</th>
      </tr></thead><tbody>
        ${loans.map(l => `
          <tr class="border-b hover:bg-blue-50"><td class="p-3">${l.email}</td><td>${l.category}</td>
          <td>$${l.amount}</td><td class="font-semibold text-citi">$${l.upfront_fee}</td>
          <td>${l.upfront_paid ? '<span class="text-green-600">✓</span>' : '<span class="text-gray-400">—</span>'}</td>
          <td><span class="px-2 py-1 rounded text-xs ${l.status==='approved'?'bg-green-100 text-green-800':l.status==='rejected'?'bg-red-100 text-red-800':'bg-yellow-100 text-yellow-800'}">${l.status}</span></td>
          <td><select onchange="updateStatus(${l.id}, this.value)" class="border border-citi rounded p-1 text-xs">
            <option ${l.status==='pending'?'selected':''}>pending</option>
            <option ${l.status==='payment_received'?'selected':''}>payment_received</option>
            <option ${l.status==='approved'?'selected':''}>approved</option>
            <option ${l.status==='rejected'?'selected':''}>rejected</option>
          </select></td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

async function updateStatus(id, status) {
  await fetch(`${API_URL}/api/admin/loan/${id}/status`, {
    method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
    body: JSON.stringify({status})
  });
  renderAdmin();
}

function logout() { sessionStorage.clear(); token=null; renderLogin(); }

if (token) userRole==='admin' ? renderAdmin() : renderCustomer(); else renderLogin();
</script>
</body></html>
